<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON/XML 格式化工具</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui-src@2.9.11/dist/css/layui.css" media="all">
    <style>
        body {
            background: #f6f8fb;
            padding: 24px;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        .tool-card {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .tool-title {
            margin-bottom: 18px;
            font-size: 24px;
            font-weight: 600;
            color: #1f2d3d;
        }

        .tool-row {
            margin-bottom: 14px;
        }

        .tool-actions {
            margin-top: 12px;
            margin-bottom: 12px;
        }

        .tool-actions .layui-btn {
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .layout-container {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .layout-container.layout-vertical {
            flex-direction: column;
        }

        .layout-container.layout-horizontal {
            flex-direction: row;
        }

        .layout-panel {
            flex: 1;
            min-width: 0;
        }

        .panel-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .result-box {
            margin-top: 14px;
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            background: #1e1f22;
            color: #f8f8f2;
            min-height: 320px;
            max-height: 600px;
            overflow: auto;
            padding: 14px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
            font-family: Consolas, "Courier New", monospace;
        }

        .result-box.fold-mode {
            white-space: normal;
            word-break: normal;
        }

        .fold-tree details {
            margin-left: 14px;
            padding-left: 4px;
            border-left: 1px dashed #374151;
        }

        .fold-tree > details {
            margin-left: 0;
            border-left: none;
            padding-left: 0;
        }

        .fold-tree summary {
            cursor: pointer;
            color: #8cc5ff;
            margin: 4px 0;
            font-weight: 600;
        }

        .fold-tree .fold-line {
            margin: 4px 0 4px 16px;
            color: #f8f8f2;
        }

        .fold-tree .fold-key {
            color: #8cc5ff;
        }

        .fold-tree .fold-value {
            color: #ffec99;
        }

        .keyword-highlight {
            background: #ffec99;
            color: #222;
            border-radius: 3px;
            padding: 0 2px;
        }

        .search-highlight {
            background: #8cc5ff;
            color: #0d2034;
            border-radius: 3px;
            padding: 0 2px;
        }

        .search-highlight-active {
            background: #ff9f43;
            color: #2f1200;
            border-radius: 3px;
            padding: 0 2px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
        }

        .error-text {
            color: #ff5722;
            margin-top: 6px;
            min-height: 22px;
        }
    </style>
</head>
<body>
<div class="tool-card">
    <h1 class="tool-title">JSON / XML 格式化工具</h1>
    <div class="tool-row">
        <label class="layui-form-label" style="width: 90px; padding-left: 0;">数据类型</label>
        <div class="layui-input-inline" style="width: 180px;">
            <select id="dataType" class="layui-input">
                <option value="json">JSON</option>
                <option value="xml">XML</option>
            </select>
        </div>
    </div>
    <div class="tool-row">
        <label class="layui-form-label" style="width: 90px; padding-left: 0;">布局切换</label>
        <div class="layui-input-inline" style="width: 180px;">
            <select id="layoutMode" class="layui-input">
                <option value="vertical">上下布局</option>
                <option value="horizontal">左右布局</option>
            </select>
        </div>
    </div>
    <div class="tool-row">
        <label class="layui-form-label" style="width: 90px; padding-left: 0;">关键词</label>
        <div class="layui-input-block" style="margin-left: 100px;">
            <input id="keywordsInput" type="text" class="layui-input"
                   placeholder="多个关键词用空格或逗号分隔，例如：name,id,status">
        </div>
    </div>
    <div class="tool-row">
        <label class="layui-form-label" style="width: 90px; padding-left: 0;">搜索定位</label>
        <div class="layui-input-block" style="margin-left: 100px;">
            <input id="searchInput" type="text" class="layui-input"
                   placeholder="输入要定位的词，支持上下一个跳转（Enter/F3）">
        </div>
    </div>
    <div class="tool-actions">
        <button id="formatBtn" class="layui-btn">格式化并高亮</button>
        <button id="foldBtn" class="layui-btn">折叠视图</button>
        <button id="validateBtn" class="layui-btn">格式验证</button>
        <button id="highlightBtn" class="layui-btn layui-btn-normal">仅重新高亮</button>
        <button id="searchBtn" class="layui-btn layui-btn-primary">定位首个</button>
        <button id="prevBtn" class="layui-btn layui-btn-primary">上一个</button>
        <button id="nextBtn" class="layui-btn layui-btn-primary">下一个</button>
        <button id="copyBtn" class="layui-btn layui-btn-warm">复制结果</button>
        <button id="clearBtn" class="layui-btn layui-btn-primary">清空</button>
    </div>
    <div id="layoutContainer" class="layout-container layout-vertical">
        <div class="layout-panel">
            <div class="panel-label">原始内容</div>
            <textarea id="sourceText" class="layui-textarea" style="min-height: 220px;"
                      placeholder="请输入 JSON 或 XML 字符串"></textarea>
        </div>
        <div class="layout-panel">
            <div class="panel-label">结果预览</div>
            <div id="errorText" class="error-text"></div>
            <div id="searchMeta" style="margin-bottom: 8px; color: #666;"></div>
            <div id="resultView" class="result-box"></div>
        </div>
    </div>
</div>

<script>
    (function () {
        var resultView = document.getElementById("resultView");
        var sourceText = document.getElementById("sourceText");
        var keywordsInput = document.getElementById("keywordsInput");
        var searchInput = document.getElementById("searchInput");
        var dataType = document.getElementById("dataType");
        var layoutMode = document.getElementById("layoutMode");
        var layoutContainer = document.getElementById("layoutContainer");
        var foldBtn = document.getElementById("foldBtn");
        var errorText = document.getElementById("errorText");
        var searchMeta = document.getElementById("searchMeta");
        var layoutStorageKey = "formatter.layout.mode";
        var lastFormattedText = "";
        var structuredData = null;
        var searchMatches = [];
        var activeSearchIndex = -1;
        var lastSearchWord = "";
        var currentViewMode = "text";

        initLayoutMode();
        layoutMode.addEventListener("change", function () {
            applyLayout(layoutMode.value);
        });
        foldBtn.addEventListener("click", function () {
            toggleFoldView();
        });

        document.getElementById("formatBtn").addEventListener("click", function () {
            clearStatus();
            var content = sourceText.value;
            if (!content || !content.trim()) {
                showStatus("请输入要处理的内容。", true);
                return;
            }

            try {
                var formatted;
                if (dataType.value === "json") {
                    var jsonResult = formatJsonWithAssist(content);
                    formatted = jsonResult.formatted;
                    structuredData = {type: "json", value: jsonResult.parsedValue};
                    if (jsonResult.autoFixed) {
                        var changeText = jsonResult.changes && jsonResult.changes.length ? "（" + jsonResult.changes.join("、") + "）" : "";
                        showStatus("已完成智能修正并格式化 " + changeText, false);
                    }
                } else {
                    formatted = formatContent(content, dataType.value);
                    structuredData = {type: "xml", value: parseXmlForFold(content)};
                }
                lastFormattedText = formatted;
                renderOutput(true);
            } catch (error) {
                structuredData = null;
                if (currentViewMode === "fold") {
                    currentViewMode = "text";
                    foldBtn.textContent = "折叠视图";
                    resultView.classList.remove("fold-mode");
                }
                showStatus(error.message, true);
                if (dataType.value !== "json") {
                    resultView.textContent = "";
                }
            }
        });

        document.getElementById("validateBtn").addEventListener("click", function () {
            clearStatus();
            var content = sourceText.value;
            if (!content || !content.trim()) {
                showStatus("请输入要校验的内容。", true);
                return;
            }
            if (dataType.value === "json") {
                var parsed = tryParseJson(content);
                if (parsed.ok) {
                    showStatus("JSON 格式校验通过。", false);
                    return;
                }
                var errorInfo = getJsonErrorInfo(content, parsed.error);
                highlightJsonErrorPosition(errorInfo);
                showStatus(buildJsonErrorMessage(errorInfo, false, []), true);
                return;
            }
            if (dataType.value === "xml") {
                var xmlCheck = validateXmlContent(content);
                if (xmlCheck.ok) {
                    showStatus("XML 格式校验通过。", false);
                    return;
                }
                if (xmlCheck.preview) {
                    resultView.textContent = "错误定位：\n" + xmlCheck.preview;
                }
                if (xmlCheck.index >= 0 && typeof sourceText.setSelectionRange === "function") {
                    var start = Math.min(xmlCheck.index, sourceText.value.length);
                    var end = Math.min(start + 1, sourceText.value.length);
                    sourceText.focus();
                    sourceText.setSelectionRange(start, end);
                    sourceText.style.borderColor = "#ef4444";
                }
                showStatus(xmlCheck.message, true);
            }
        });

        document.getElementById("highlightBtn").addEventListener("click", function () {
            if (!lastFormattedText) {
                showStatus("请先执行格式化。", true);
                return;
            }
            clearStatus();
            renderOutput(true);
        });

        document.getElementById("searchBtn").addEventListener("click", function () {
            locateFirst();
        });

        document.getElementById("prevBtn").addEventListener("click", function () {
            locateStep(-1);
        });

        document.getElementById("nextBtn").addEventListener("click", function () {
            locateStep(1);
        });

        document.getElementById("copyBtn").addEventListener("click", function () {
            if (!lastFormattedText) {
                showStatus("当前没有可复制的结果。", true);
                return;
            }
            copyText(lastFormattedText);
        });

        document.getElementById("clearBtn").addEventListener("click", function () {
            sourceText.value = "";
            keywordsInput.value = "";
            searchInput.value = "";
            clearStatus();
            lastFormattedText = "";
            structuredData = null;
            searchMatches = [];
            activeSearchIndex = -1;
            lastSearchWord = "";
            currentViewMode = "text";
            foldBtn.textContent = "折叠视图";
            searchMeta.textContent = "";
            resultView.textContent = "";
            resultView.classList.remove("fold-mode");
        });

        searchInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                locateFirst();
            }
        });

        document.addEventListener("keydown", function (event) {
            var key = (event.key || "").toLowerCase();
            if ((event.ctrlKey || event.metaKey) && key === "enter") {
                event.preventDefault();
                document.getElementById("formatBtn").click();
                return;
            }
            if (event.key === "F3") {
                event.preventDefault();
                locateStep(event.shiftKey ? -1 : 1);
            }
        });

        function formatContent(content, type) {
            if (type === "json") {
                try {
                    var parsed = JSON.parse(content);
                    return JSON.stringify(parsed, null, 2);
                } catch (error) {
                    throw new Error("JSON 格式不合法，请检查后重试。");
                }
            }

            if (type === "xml") {
                return formatXml(content);
            }

            throw new Error("不支持的数据类型。");
        }

        function formatJsonWithAssist(content) {
            var parsed = tryParseJson(content);
            if (parsed.ok) {
                return {
                    formatted: JSON.stringify(parsed.value, null, 2),
                    autoFixed: false,
                    parsedValue: parsed.value,
                    changes: []
                };
            }

            var errorInfo = getJsonErrorInfo(content, parsed.error);
            highlightJsonErrorPosition(errorInfo);

            var repaired = applyJsonRepairPipeline(content);
            if (repaired.text !== content) {
                var changeText = repaired.changes.length ? "，将尝试：" + repaired.changes.join("、") : "";
                var shouldFix = window.confirm("检测到 JSON 有问题，是否一键智能修正" + changeText + "？");
                if (shouldFix) {
                    var mergedChanges = repaired.changes.slice();
                    var fixedText = repaired.text;
                    for (var round = 0; round < 2; round++) {
                        var roundParsed = tryParseJson(fixedText);
                        if (roundParsed.ok) {
                            sourceText.value = fixedText;
                            return {
                                formatted: JSON.stringify(roundParsed.value, null, 2),
                                autoFixed: true,
                                parsedValue: roundParsed.value,
                                changes: mergedChanges
                            };
                        }
                        var nextRepair = applyJsonRepairPipeline(fixedText);
                        if (nextRepair.text === fixedText) {
                            var fixedInfo = getJsonErrorInfo(fixedText, roundParsed.error);
                            highlightJsonErrorPosition(fixedInfo);
                            throw new Error(buildJsonErrorMessage(fixedInfo, true, mergedChanges));
                        }
                        fixedText = nextRepair.text;
                        mergedChanges = mergeChangeList(mergedChanges, nextRepair.changes);
                    }

                    var finalParsed = tryParseJson(fixedText);
                    if (finalParsed.ok) {
                        sourceText.value = fixedText;
                        return {
                            formatted: JSON.stringify(finalParsed.value, null, 2),
                            autoFixed: true,
                            parsedValue: finalParsed.value,
                            changes: mergedChanges
                        };
                    }
                    var finalInfo = getJsonErrorInfo(fixedText, finalParsed.error);
                    highlightJsonErrorPosition(finalInfo);
                    throw new Error(buildJsonErrorMessage(finalInfo, true, mergedChanges));
                }
            }
            throw new Error(buildJsonErrorMessage(errorInfo, false, repaired.changes));
        }

        function tryParseJson(content) {
            try {
                return {ok: true, value: JSON.parse(content)};
            } catch (error) {
                return {ok: false, error: error};
            }
        }

        function applyJsonRepairPipeline(content) {
            var text = content;
            var changes = [];

            function applyFix(name, fixer) {
                var next = fixer(text);
                if (next !== text) {
                    text = next;
                    changes.push(name);
                }
            }

            applyFix("清理包装与特殊符号", normalizeJsonInput);
            applyFix("去除注释", stripJsonComments);
            applyFix("对象键补双引号", quoteUnquotedKeys);
            applyFix("单引号字符串转双引号", convertSingleQuotedStrings);
            applyFix("常见字面量转 JSON", normalizeCommonLiterals);
            applyFix("补全缺失逗号", addMissingCommas);
            applyFix("移除尾随逗号", removeTrailingCommas);
            applyFix("补全括号", balanceJsonBrackets);

            return {
                text: text,
                changes: changes
            };
        }

        function normalizeJsonInput(content) {
            var text = content;
            text = text.replace(/^\uFEFF/, "");
            text = stripMarkdownCodeFence(text);
            text = text
                .replace(/[“”]/g, "\"")
                .replace(/[‘’]/g, "'")
                .replace(/，/g, ",")
                .replace(/：/g, ":")
                .replace(/；/g, ",")
                .replace(/[｛]/g, "{")
                .replace(/[｝]/g, "}")
                .replace(/[【]/g, "[")
                .replace(/[】]/g, "]");

            var trimmed = text.trim();
            trimmed = trimmed
                .replace(/^\s*(?:var|let|const)\s+[A-Za-z_$][\w$]*\s*=\s*/, "")
                .replace(/^\s*[A-Za-z_$][\w$]*\s*=\s*/, "")
                .replace(/;\s*$/, "");

            if (trimmed.charAt(0) === "(" && trimmed.charAt(trimmed.length - 1) === ")") {
                var inner = trimmed.slice(1, -1).trim();
                if ((inner.charAt(0) === "{" && inner.charAt(inner.length - 1) === "}") ||
                    (inner.charAt(0) === "[" && inner.charAt(inner.length - 1) === "]")) {
                    trimmed = inner;
                }
            }
            return trimmed;
        }

        function stripMarkdownCodeFence(content) {
            var text = content.trim();
            if (/^```/i.test(text) && /```$/.test(text)) {
                return text
                    .replace(/^```(?:json|javascript|js)?\s*/i, "")
                    .replace(/\s*```$/, "");
            }
            return content;
        }

        function stripJsonComments(content) {
            var out = "";
            var inDouble = false;
            var inSingle = false;
            var inLineComment = false;
            var inBlockComment = false;

            for (var i = 0; i < content.length; i++) {
                var ch = content.charAt(i);
                var next = i + 1 < content.length ? content.charAt(i + 1) : "";

                if (inLineComment) {
                    if (ch === "\n") {
                        inLineComment = false;
                        out += ch;
                    }
                    continue;
                }
                if (inBlockComment) {
                    if (ch === "*" && next === "/") {
                        inBlockComment = false;
                        i++;
                    }
                    continue;
                }

                if (!inDouble && !inSingle && ch === "/" && next === "/") {
                    inLineComment = true;
                    i++;
                    continue;
                }
                if (!inDouble && !inSingle && ch === "/" && next === "*") {
                    inBlockComment = true;
                    i++;
                    continue;
                }

                if (ch === "\"" && !inSingle) {
                    var escaped = i > 0 && content.charAt(i - 1) === "\\";
                    if (!escaped) {
                        inDouble = !inDouble;
                    }
                } else if (ch === "'" && !inDouble) {
                    var escapedSingle = i > 0 && content.charAt(i - 1) === "\\";
                    if (!escapedSingle) {
                        inSingle = !inSingle;
                    }
                }
                out += ch;
            }
            return out;
        }

        function replaceOutsideStrings(content, replacer) {
            var out = "";
            var chunk = "";
            var mode = "normal";

            for (var i = 0; i < content.length; i++) {
                var ch = content.charAt(i);
                if (mode === "normal") {
                    if (ch === "\"" || ch === "'") {
                        out += replacer(chunk);
                        chunk = "";
                        out += ch;
                        mode = ch === "\"" ? "double" : "single";
                    } else {
                        chunk += ch;
                    }
                } else {
                    out += ch;
                    if (ch === "\\") {
                        i++;
                        if (i < content.length) {
                            out += content.charAt(i);
                        }
                        continue;
                    }
                    if ((mode === "double" && ch === "\"") || (mode === "single" && ch === "'")) {
                        mode = "normal";
                    }
                }
            }
            out += replacer(chunk);
            return out;
        }

        function normalizeCommonLiterals(content) {
            return replaceOutsideStrings(content, function (segment) {
                var normalized = segment
                    .replace(/\bTrue\b/g, "true")
                    .replace(/\bFalse\b/g, "false")
                    .replace(/\bNone\b/g, "null")
                    .replace(/\bundefined\b/g, "null")
                    .replace(/\bNaN\b/g, "null");

                normalized = normalized.replace(/(:\s*)([A-Za-z_\u4e00-\u9fa5$][\w\-\u4e00-\u9fa5$]*)(\s*[,}\]])/g, function (m, p1, p2, p3) {
                    if (/^(true|false|null)$/i.test(p2)) {
                        return p1 + p2.toLowerCase() + p3;
                    }
                    return p1 + "\"" + p2 + "\"" + p3;
                });
                return normalized;
            });
        }

        function addMissingCommas(content) {
            return replaceOutsideStrings(content, function (segment) {
                return segment
                    .replace(/([}\]"0-9a-zA-Z])(\s*\n\s*)(?=(["{\[]|[A-Za-z_\u4e00-\u9fa5$][\w\-\u4e00-\u9fa5$]*\s*:))/g, "$1,$2")
                    .replace(/([}\]"0-9a-zA-Z])(\s{2,})(?=(["{\[]))/g, "$1,$2");
            });
        }

        function removeTrailingCommas(content) {
            return replaceOutsideStrings(content, function (segment) {
                return segment.replace(/,\s*([}\]])/g, "$1");
            });
        }

        function balanceJsonBrackets(content) {
            var out = "";
            var stack = [];
            var mode = "normal";

            for (var i = 0; i < content.length; i++) {
                var ch = content.charAt(i);
                if (mode === "normal") {
                    if (ch === "\"" || ch === "'") {
                        mode = ch === "\"" ? "double" : "single";
                        out += ch;
                        continue;
                    }
                    if (ch === "{" || ch === "[") {
                        stack.push(ch);
                        out += ch;
                        continue;
                    }
                    if (ch === "}" || ch === "]") {
                        if (stack.length === 0) {
                            continue;
                        }
                        var top = stack[stack.length - 1];
                        if ((top === "{" && ch === "}") || (top === "[" && ch === "]")) {
                            stack.pop();
                            out += ch;
                            continue;
                        }
                        continue;
                    }
                    out += ch;
                    continue;
                }

                out += ch;
                if (ch === "\\") {
                    i++;
                    if (i < content.length) {
                        out += content.charAt(i);
                    }
                    continue;
                }
                if ((mode === "double" && ch === "\"") || (mode === "single" && ch === "'")) {
                    mode = "normal";
                }
            }

            while (stack.length > 0) {
                var left = stack.pop();
                out += left === "{" ? "}" : "]";
            }
            return out;
        }

        function quoteUnquotedKeys(content) {
            return content.replace(/([{,]\s*)([A-Za-z_\u4e00-\u9fa5$][\w\-\u4e00-\u9fa5$]*)(\s*:)/g, "$1\"$2\"$3");
        }

        function convertSingleQuotedStrings(content) {
            return content.replace(/'([^'\\]*(?:\\.[^'\\]*)*)'/g, function (_, body) {
                var unescaped = body.replace(/\\'/g, "'");
                var escaped = unescaped.replace(/"/g, "\\\"");
                return "\"" + escaped + "\"";
            });
        }

        function mergeChangeList(listA, listB) {
            var map = {};
            var merged = [];
            var all = (listA || []).concat(listB || []);
            for (var i = 0; i < all.length; i++) {
                if (!map[all[i]]) {
                    map[all[i]] = true;
                    merged.push(all[i]);
                }
            }
            return merged;
        }

        function getJsonErrorInfo(content, error) {
            var index = extractJsonErrorIndex(content, error);
            var line = 0;
            var column = 0;
            if (index >= 0) {
                var lineCol = getLineColumnByIndex(content, index);
                line = lineCol.line;
                column = lineCol.column;
            }
            return {
                index: index,
                line: line,
                column: column,
                preview: buildJsonErrorPreview(content, index),
                rawMessage: error && error.message ? error.message : ""
            };
        }

        function extractJsonErrorIndex(content, error) {
            var message = error && error.message ? error.message : "";
            var posMatch = message.match(/position\s+(\d+)/i);
            if (posMatch) {
                return parseInt(posMatch[1], 10);
            }
            var lineColMatch = message.match(/line\s+(\d+)\s+column\s+(\d+)/i);
            if (lineColMatch) {
                return indexFromLineColumn(content, parseInt(lineColMatch[1], 10), parseInt(lineColMatch[2], 10));
            }
            return -1;
        }

        function getLineColumnByIndex(content, index) {
            var safeIndex = Math.max(0, Math.min(index, content.length));
            var before = content.slice(0, safeIndex).split("\n");
            return {
                line: before.length,
                column: before[before.length - 1].length + 1
            };
        }

        function indexFromLineColumn(content, line, column) {
            if (line <= 0 || column <= 0) {
                return -1;
            }
            var lines = content.split("\n");
            if (line > lines.length) {
                return -1;
            }
            var index = 0;
            for (var i = 0; i < line - 1; i++) {
                index += lines[i].length + 1;
            }
            return index + column - 1;
        }

        function buildJsonErrorPreview(content, index) {
            if (index < 0) {
                return "";
            }
            var lineCol = getLineColumnByIndex(content, index);
            var lines = content.split("\n");
            var lineText = lines[lineCol.line - 1] || "";
            var pointer = new Array(Math.max(lineCol.column, 1)).join(" ") + "^";
            return lineText + "\n" + pointer;
        }

        function buildJsonErrorMessage(errorInfo, isAutoFixedRetry, appliedChanges) {
            var prefix = isAutoFixedRetry ? "JSON 自动修正后仍有错误" : "JSON 格式错误";
            var changeText = appliedChanges && appliedChanges.length ? " 已尝试：" + appliedChanges.join("、") + "。" : "";
            var detail = errorInfo.rawMessage ? " 原始错误：" + errorInfo.rawMessage.replace(/\s+/g, " ") : "";
            if (errorInfo.line > 0) {
                return prefix + "，第 " + errorInfo.line + " 行第 " + errorInfo.column + " 列附近有问题。" + changeText + detail;
            }
            return prefix + "，但暂时无法定位具体行列。" + changeText + detail;
        }

        function highlightJsonErrorPosition(errorInfo) {
            if (!errorInfo) {
                return;
            }
            if (errorInfo.preview) {
                resultView.textContent = "错误定位：\n" + errorInfo.preview;
            }
            if (errorInfo.index >= 0 && typeof sourceText.setSelectionRange === "function") {
                var caretStart = Math.min(errorInfo.index, sourceText.value.length);
                var caretEnd = Math.min(caretStart + 1, sourceText.value.length);
                sourceText.focus();
                sourceText.setSelectionRange(caretStart, caretEnd);
            }
            sourceText.style.borderColor = "#ef4444";
        }

        function parseXmlForFold(xmlString) {
            var parser = new DOMParser();
            var xmlDoc = parser.parseFromString(xmlString, "application/xml");
            if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                throw new Error("XML 格式不合法，请检查后重试。");
            }
            return xmlDoc;
        }

        function formatXml(xmlString) {
            var xmlDoc = parseXmlForFold(xmlString);

            var serialized = new XMLSerializer().serializeToString(xmlDoc);
            var xml = serialized.replace(/(>)(<)(\/*)/g, "$1\n$2$3");
            var lines = xml.split("\n");
            var indent = 0;
            var pad = "  ";
            var out = [];

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) {
                    continue;
                }

                var isClosingTag = /^<\/[^>]+>$/.test(line);
                var isDeclarationOrComment = /^<\?/.test(line) || /^<!/.test(line);
                var isSelfClosingTag = /\/>$/.test(line);
                var isOpeningTag = /^<[^!?\/][^>]*>$/.test(line) && !isSelfClosingTag && !/<\/[^>]+>$/.test(line);

                if (isClosingTag) {
                    indent = Math.max(indent - 1, 0);
                }

                out.push(new Array(indent + 1).join(pad) + line);

                if (isOpeningTag && !isDeclarationOrComment) {
                    indent++;
                }
            }

            return out.join("\n");
        }

        function validateXmlContent(content) {
            var parser = new DOMParser();
            var xmlDoc = parser.parseFromString(content, "application/xml");
            var errNode = xmlDoc.getElementsByTagName("parsererror")[0];
            if (!errNode) {
                return {ok: true};
            }
            var rawMessage = ((errNode.textContent || "").replace(/\s+/g, " ")).trim();
            var line = 0;
            var column = 0;
            var m = rawMessage.match(/line\s+(\d+).*column\s+(\d+)/i) ||
                    rawMessage.match(/Line Number\s+(\d+),\s*Column\s+(\d+)/i);
            var index = -1;
            var preview = "";
            if (m) {
                line = parseInt(m[1], 10);
                column = parseInt(m[2], 10);
                index = indexFromLineColumn(content, line, column);
                preview = buildJsonErrorPreview(content, index);
            }
            var msg = line > 0
                ? "XML 格式错误，第 " + line + " 行第 " + column + " 列附近有问题。"
                : "XML 格式错误，请检查标签闭合与属性写法。";
            if (rawMessage) {
                msg += " 原始错误：" + rawMessage;
            }
            return {
                ok: false,
                message: msg,
                index: index,
                preview: preview
            };
        }

        function renderHighlightedResult(text, keywordRaw, searchWord, resetSearchToFirst) {
            resultView.classList.remove("fold-mode");
            var keywords = parseKeywords(keywordRaw);
            var normalizedSearchWord = (searchWord || "").trim();
            var rendered = buildHighlightedHtml(text, keywords, normalizedSearchWord, resetSearchToFirst);
            resultView.innerHTML = rendered.html;
            searchMatches = rendered.searchMatches;
            activeSearchIndex = rendered.activeSearchIndex;
            lastSearchWord = normalizedSearchWord;
            updateSearchMeta();
            scrollToActiveMatch();
        }

        function renderOutput(resetSearchToFirst) {
            if (currentViewMode === "fold") {
                renderFoldedResult();
                return;
            }
            renderHighlightedResult(lastFormattedText, keywordsInput.value, searchInput.value, resetSearchToFirst);
        }

        function toggleFoldView() {
            if (currentViewMode === "text") {
                if (!structuredData || !structuredData.value) {
                    showStatus("请先格式化 JSON 或 XML 后再使用折叠视图。", true);
                    return;
                }
                currentViewMode = "fold";
                foldBtn.textContent = "文本视图";
                renderFoldedResult();
                return;
            }
            currentViewMode = "text";
            foldBtn.textContent = "折叠视图";
            renderOutput(true);
        }

        function renderFoldedResult() {
            if (!structuredData || !structuredData.value) {
                showStatus("当前内容不支持折叠视图。", true);
                currentViewMode = "text";
                foldBtn.textContent = "折叠视图";
                renderOutput(true);
                return;
            }
            resultView.classList.add("fold-mode");
            resultView.innerHTML = "";
            searchMatches = [];
            activeSearchIndex = -1;
            lastSearchWord = "";

            var tree = document.createElement("div");
            tree.className = "fold-tree";
            if (structuredData.type === "json") {
                tree.appendChild(buildJsonTreeNode(structuredData.value, "root", 0));
            } else if (structuredData.type === "xml") {
                var rootEl = structuredData.value && structuredData.value.documentElement;
                if (rootEl) {
                    tree.appendChild(buildXmlTreeNode(rootEl, 0));
                } else {
                    tree.textContent = "XML 根节点为空。";
                }
            } else {
                tree.textContent = "当前类型暂不支持折叠。";
            }
            resultView.appendChild(tree);
            searchMeta.textContent = "折叠视图：点击节点左侧箭头可展开/收起。";
        }

        function buildJsonTreeNode(value, label, depth) {
            var isArray = Array.isArray(value);
            var isObject = value && typeof value === "object" && !isArray;
            if (!isArray && !isObject) {
                var primitive = document.createElement("div");
                primitive.className = "fold-line";
                primitive.innerHTML = '<span class="fold-key">' + escapeHtml(label) + '</span>: <span class="fold-value">' + escapeHtml(formatJsonPrimitive(value)) + "</span>";
                return primitive;
            }

            var details = document.createElement("details");
            if (depth <= 1) {
                details.open = true;
            }
            var summary = document.createElement("summary");
            var count = isArray ? value.length : Object.keys(value).length;
            summary.textContent = label + (isArray ? " [Array(" + count + ")]" : " {Object(" + count + ")}");
            details.appendChild(summary);

            if (isArray) {
                for (var i = 0; i < value.length; i++) {
                    details.appendChild(buildJsonTreeNode(value[i], "[" + i + "]", depth + 1));
                }
            } else {
                var keys = Object.keys(value);
                for (var k = 0; k < keys.length; k++) {
                    var key = keys[k];
                    details.appendChild(buildJsonTreeNode(value[key], key, depth + 1));
                }
            }
            return details;
        }

        function formatJsonPrimitive(value) {
            if (typeof value === "string") {
                return '"' + value + '"';
            }
            return String(value);
        }

        function buildXmlTreeNode(element, depth) {
            var details = document.createElement("details");
            if (depth <= 1) {
                details.open = true;
            }
            var summary = document.createElement("summary");
            summary.textContent = "<" + element.nodeName + buildXmlAttrText(element) + ">";
            details.appendChild(summary);

            var hasChild = false;
            for (var i = 0; i < element.childNodes.length; i++) {
                var child = element.childNodes[i];
                if (child.nodeType === 1) {
                    hasChild = true;
                    details.appendChild(buildXmlTreeNode(child, depth + 1));
                } else if (child.nodeType === 3) {
                    var txt = (child.nodeValue || "").trim();
                    if (txt) {
                        hasChild = true;
                        var line = document.createElement("div");
                        line.className = "fold-line";
                        line.innerHTML = '<span class="fold-value">' + escapeHtml(txt) + "</span>";
                        details.appendChild(line);
                    }
                }
            }

            if (!hasChild) {
                var emptyLine = document.createElement("div");
                emptyLine.className = "fold-line";
                emptyLine.innerHTML = '<span class="fold-value">(empty)</span>';
                details.appendChild(emptyLine);
            }
            return details;
        }

        function buildXmlAttrText(element) {
            if (!element.attributes || element.attributes.length === 0) {
                return "";
            }
            var attrs = [];
            for (var i = 0; i < element.attributes.length; i++) {
                var attr = element.attributes[i];
                attrs.push(attr.name + '="' + attr.value + '"');
            }
            return " " + attrs.join(" ");
        }

        function parseKeywords(keywordRaw) {
            if (!keywordRaw) {
                return [];
            }
            var list = keywordRaw.split(/[\s,，]+/);
            var unique = {};
            var keywords = [];
            for (var i = 0; i < list.length; i++) {
                var word = list[i].trim();
                if (word && !unique[word]) {
                    unique[word] = true;
                    keywords.push(word);
                }
            }
            return keywords;
        }

        function buildHighlightedHtml(text, keywords, searchWord, resetSearchToFirst) {
            var len = text.length;
            if (len === 0) {
                return {html: "", searchMatches: [], activeSearchIndex: -1};
            }

            var styleMap = new Array(len);
            for (var si = 0; si < len; si++) {
                styleMap[si] = 0;
            }

            for (var k = 0; k < keywords.length; k++) {
                applyStyleForTerm(text, keywords[k], styleMap, 1);
            }

            var searchRangeList = collectRanges(text, searchWord);
            var nextActiveSearchIndex = activeSearchIndex;
            if (!searchWord || searchRangeList.length === 0) {
                nextActiveSearchIndex = -1;
            } else if (resetSearchToFirst || nextActiveSearchIndex < 0 || nextActiveSearchIndex >= searchRangeList.length) {
                nextActiveSearchIndex = 0;
            }

            for (var sr = 0; sr < searchRangeList.length; sr++) {
                var range = searchRangeList[sr];
                var styleCode = (sr === nextActiveSearchIndex) ? 3 : 2;
                for (var r = range.start; r < range.end; r++) {
                    styleMap[r] = styleCode;
                }
            }

            var html = "";
            var segmentStart = 0;
            var currentStyle = styleMap[0];
            for (var i = 1; i <= len; i++) {
                var style = (i < len) ? styleMap[i] : -1;
                if (style !== currentStyle) {
                    html += renderSegment(text.slice(segmentStart, i), currentStyle);
                    segmentStart = i;
                    currentStyle = style;
                }
            }
            return {
                html: html,
                searchMatches: searchRangeList,
                activeSearchIndex: nextActiveSearchIndex
            };
        }

        function applyStyleForTerm(text, term, styleMap, styleCode) {
            var ranges = collectRanges(text, term);
            for (var i = 0; i < ranges.length; i++) {
                for (var p = ranges[i].start; p < ranges[i].end; p++) {
                    if (styleMap[p] < styleCode) {
                        styleMap[p] = styleCode;
                    }
                }
            }
        }

        function collectRanges(text, term) {
            if (!term) {
                return [];
            }
            var matcher = new RegExp(escapeRegExp(term), "gi");
            var match;
            var result = [];
            while ((match = matcher.exec(text)) !== null) {
                var start = match.index;
                result.push({start: start, end: start + match[0].length});
                if (match[0].length === 0) {
                    matcher.lastIndex++;
                }
            }
            return result;
        }

        function renderSegment(segmentText, styleCode) {
            if (segmentText === "") {
                return "";
            }
            var escaped = escapeHtml(segmentText);
            if (styleCode === 1) {
                return '<span class="keyword-highlight">' + escaped + "</span>";
            }
            if (styleCode === 2) {
                return '<span class="search-highlight">' + escaped + "</span>";
            }
            if (styleCode === 3) {
                return '<span class="search-highlight-active">' + escaped + "</span>";
            }
            return escaped;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function copyText(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function () {
                    showStatus("复制成功。", false);
                }).catch(function () {
                    fallbackCopyText(text);
                });
                return;
            }
            fallbackCopyText(text);
        }

        function fallbackCopyText(text) {
            var temp = document.createElement("textarea");
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            var successful = document.execCommand("copy");
            document.body.removeChild(temp);
            if (successful) {
                showStatus("复制成功。", false);
            } else {
                showStatus("复制失败，请手动复制。", true);
            }
        }

        function showStatus(message, isError) {
            errorText.style.color = isError ? "#ff5722" : "#16b777";
            errorText.textContent = message;
        }

        function clearStatus() {
            errorText.style.color = "#ff5722";
            errorText.textContent = "";
            sourceText.style.borderColor = "";
        }

        function locateFirst() {
            if (!lastFormattedText) {
                showStatus("请先执行格式化。", true);
                return;
            }
            if (currentViewMode === "fold") {
                showStatus("折叠视图下请先切回文本视图再搜索定位。", true);
                return;
            }
            var word = (searchInput.value || "").trim();
            if (!word) {
                showStatus("请输入要搜索定位的词。", true);
                return;
            }
            clearStatus();
            renderHighlightedResult(lastFormattedText, keywordsInput.value, word, true);
            if (searchMatches.length === 0) {
                showStatus("未找到匹配项。", true);
            }
        }

        function locateStep(step) {
            if (!lastFormattedText) {
                showStatus("请先执行格式化。", true);
                return;
            }
            if (currentViewMode === "fold") {
                showStatus("折叠视图下请先切回文本视图再搜索定位。", true);
                return;
            }
            var word = (searchInput.value || "").trim();
            if (!word) {
                showStatus("请输入要搜索定位的词。", true);
                return;
            }
            if (word !== lastSearchWord) {
                renderHighlightedResult(lastFormattedText, keywordsInput.value, word, true);
                if (searchMatches.length === 0) {
                    showStatus("未找到匹配项。", true);
                    return;
                }
                if (step < 0) {
                    activeSearchIndex = searchMatches.length - 1;
                    renderHighlightedResult(lastFormattedText, keywordsInput.value, word, false);
                }
                clearStatus();
                return;
            }

            if (searchMatches.length === 0) {
                renderHighlightedResult(lastFormattedText, keywordsInput.value, word, true);
                if (searchMatches.length === 0) {
                    showStatus("未找到匹配项。", true);
                    return;
                }
            }
            activeSearchIndex = (activeSearchIndex + step + searchMatches.length) % searchMatches.length;
            renderHighlightedResult(lastFormattedText, keywordsInput.value, word, false);
            clearStatus();
        }

        function updateSearchMeta() {
            if ((searchInput.value || "").trim() === "") {
                searchMeta.textContent = "快捷键：Ctrl/Cmd + Enter 格式化，F3 下一个，Shift + F3 上一个";
                return;
            }
            if (searchMatches.length === 0) {
                searchMeta.textContent = "匹配：0";
                return;
            }
            searchMeta.textContent = "匹配：" + (activeSearchIndex + 1) + " / " + searchMatches.length;
        }

        function initLayoutMode() {
            var saved = "";
            try {
                saved = window.localStorage.getItem(layoutStorageKey) || "";
            } catch (e) {
                saved = "";
            }
            var mode = saved === "horizontal" ? "horizontal" : "vertical";
            layoutMode.value = mode;
            applyLayout(mode);
        }

        function applyLayout(mode) {
            var finalMode = mode === "horizontal" ? "horizontal" : "vertical";
            layoutContainer.classList.remove("layout-horizontal");
            layoutContainer.classList.remove("layout-vertical");
            layoutContainer.classList.add("layout-" + finalMode);
            try {
                window.localStorage.setItem(layoutStorageKey, finalMode);
            } catch (e) {}
        }

        function scrollToActiveMatch() {
            if (activeSearchIndex < 0) {
                return;
            }
            var node = resultView.querySelector(".search-highlight-active");
            if (node && typeof node.scrollIntoView === "function") {
                node.scrollIntoView({behavior: "smooth", block: "center"});
            }
        }

        updateSearchMeta();
    })();
</script>
</body>
</html>
