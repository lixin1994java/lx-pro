name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whether Pages site exists
        id: pages_check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          if [ "$status" = "200" ]; then
            echo "Pages site already exists."
          else
            echo "Pages site is not ready (HTTP ${status})."
          fi

      - name: Show setup guidance when Pages is disabled
        if: steps.pages_check.outputs.status != '200' && env.PAGES_DEPLOY_TOKEN == ''
        run: |
          echo "::warning::GitHub Pages 尚未启用。请先到仓库 Settings > Pages，将 Source 设为 GitHub Actions。"
          echo "::warning::保存后回到 Actions 页面重试本工作流。"
          echo "::warning::如果你不方便手动开启，可创建 secret: PAGES_DEPLOY_TOKEN（PAT，至少需要 repo + pages 写权限）。"

      - name: Setup Pages
        if: steps.pages_check.outputs.status == '200' || env.PAGES_DEPLOY_TOKEN != ''
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.PAGES_DEPLOY_TOKEN != '' && env.PAGES_DEPLOY_TOKEN || github.token }}
          enablement: ${{ env.PAGES_DEPLOY_TOKEN != '' }}

      - name: Upload artifact
        if: steps.pages_check.outputs.status == '200' || env.PAGES_DEPLOY_TOKEN != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.pages_check.outputs.status == '200' || env.PAGES_DEPLOY_TOKEN != ''
        id: deployment
        uses: actions/deploy-pages@v4
