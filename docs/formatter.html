<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON/XML 格式化工具</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2d3d;
      --muted: #667085;
      --border: #e5e7eb;
      --primary: #1e80ff;
      --ok: #16a34a;
      --error: #ef4444;
      --code-bg: #111827;
      --code-fg: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 1160px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .row {
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      align-items: center;
    }

    label {
      color: var(--muted);
      font-size: 14px;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .actions {
      margin: 12px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      background: #fff;
      color: #111827;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .meta {
      min-height: 22px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .meta.error { color: var(--error); }
    .meta.ok { color: var(--ok); }

    pre {
      margin: 0;
      border: 1px solid #1f2937;
      border-radius: 10px;
      background: var(--code-bg);
      color: var(--code-fg);
      min-height: 320px;
      max-height: 620px;
      overflow: auto;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .keyword-highlight {
      background: #fde68a;
      color: #111827;
      border-radius: 3px;
      padding: 0 1px;
    }

    .search-highlight {
      background: #93c5fd;
      color: #0f172a;
      border-radius: 3px;
      padding: 0 1px;
    }

    .search-highlight-active {
      background: #fb923c;
      color: #111827;
      border-radius: 3px;
      padding: 0 1px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
<div class="container">
  <h1>JSON / XML 格式化工具</h1>

  <div class="row">
    <label for="dataType">数据类型</label>
    <select id="dataType">
      <option value="json">JSON</option>
      <option value="xml">XML</option>
    </select>
  </div>

  <div class="row" style="align-items: start;">
    <label for="sourceText">原始内容</label>
    <textarea id="sourceText" placeholder="请输入 JSON 或 XML 字符串"></textarea>
  </div>

  <div class="row">
    <label for="keywordsInput">关键词</label>
    <input id="keywordsInput" placeholder="多个关键词用空格或逗号分隔，如 name,id,status">
  </div>

  <div class="row">
    <label for="searchInput">搜索定位</label>
    <input id="searchInput" placeholder="输入要定位的词（Enter/F3/Shift+F3）">
  </div>

  <div class="actions">
    <button id="formatBtn" class="primary">格式化并高亮</button>
    <button id="highlightBtn">仅重新高亮</button>
    <button id="searchBtn">定位首个</button>
    <button id="prevBtn">上一个</button>
    <button id="nextBtn">下一个</button>
    <button id="copyBtn">复制结果</button>
    <button id="clearBtn">清空</button>
  </div>

  <div id="status" class="meta"></div>
  <div id="searchMeta" class="meta">快捷键：Ctrl/Cmd + Enter 格式化，F3 下一个，Shift + F3 上一个</div>
  <pre id="resultView"></pre>
</div>

<script>
  (function () {
    var sourceText = document.getElementById("sourceText");
    var keywordsInput = document.getElementById("keywordsInput");
    var searchInput = document.getElementById("searchInput");
    var dataType = document.getElementById("dataType");
    var resultView = document.getElementById("resultView");
    var status = document.getElementById("status");
    var searchMeta = document.getElementById("searchMeta");

    var lastFormattedText = "";
    var searchMatches = [];
    var activeSearchIndex = -1;
    var lastSearchWord = "";

    document.getElementById("formatBtn").addEventListener("click", function () {
      clearStatus();
      var content = sourceText.value;
      if (!content || !content.trim()) {
        setStatus("请输入要处理的内容。", true);
        return;
      }
      try {
        var formatted;
        if (dataType.value === "json") {
          var jsonResult = formatJsonWithAssist(content);
          formatted = jsonResult.formatted;
          if (jsonResult.autoFixed) {
            setStatus("检测到缺失双引号，已一键修正并完成格式化。", false);
          }
        } else {
          formatted = formatContent(content, dataType.value);
        }
        lastFormattedText = formatted;
        renderResult(lastFormattedText, keywordsInput.value, searchInput.value, true);
      } catch (e) {
        setStatus(e.message, true);
        if (dataType.value !== "json") {
          resultView.textContent = "";
        }
      }
    });

    document.getElementById("highlightBtn").addEventListener("click", function () {
      if (!lastFormattedText) {
        setStatus("请先执行格式化。", true);
        return;
      }
      clearStatus();
      renderResult(lastFormattedText, keywordsInput.value, searchInput.value, true);
    });

    document.getElementById("searchBtn").addEventListener("click", function () {
      locateFirst();
    });
    document.getElementById("prevBtn").addEventListener("click", function () {
      locateStep(-1);
    });
    document.getElementById("nextBtn").addEventListener("click", function () {
      locateStep(1);
    });

    document.getElementById("copyBtn").addEventListener("click", function () {
      if (!lastFormattedText) {
        setStatus("当前没有可复制的结果。", true);
        return;
      }
      copyText(lastFormattedText);
    });

    document.getElementById("clearBtn").addEventListener("click", function () {
      sourceText.value = "";
      keywordsInput.value = "";
      searchInput.value = "";
      lastFormattedText = "";
      searchMatches = [];
      activeSearchIndex = -1;
      lastSearchWord = "";
      resultView.textContent = "";
      clearStatus();
      updateSearchMeta();
    });

    searchInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        locateFirst();
      }
    });

    document.addEventListener("keydown", function (event) {
      var key = (event.key || "").toLowerCase();
      if ((event.ctrlKey || event.metaKey) && key === "enter") {
        event.preventDefault();
        document.getElementById("formatBtn").click();
        return;
      }
      if (event.key === "F3") {
        event.preventDefault();
        locateStep(event.shiftKey ? -1 : 1);
      }
    });

    function formatContent(content, type) {
      if (type === "json") {
        try {
          return JSON.stringify(JSON.parse(content), null, 2);
        } catch (e) {
          throw new Error("JSON 格式不合法，请检查后重试。");
        }
      }
      if (type === "xml") {
        return formatXml(content);
      }
      throw new Error("不支持的数据类型。");
    }

    function formatJsonWithAssist(content) {
      try {
        return {
          formatted: JSON.stringify(JSON.parse(content), null, 2),
          autoFixed: false
        };
      } catch (error) {
        var errorInfo = getJsonErrorInfo(content, error);
        highlightJsonErrorPosition(errorInfo);
        var fixedContent = autoFixMissingQuotedKeys(content);
        if (fixedContent !== content) {
          var shouldFix = window.confirm("检测到可能是对象键缺少双引号，是否一键修正并继续格式化？");
          if (shouldFix) {
            try {
              sourceText.value = fixedContent;
              return {
                formatted: JSON.stringify(JSON.parse(fixedContent), null, 2),
                autoFixed: true
              };
            } catch (fixedError) {
              var fixedInfo = getJsonErrorInfo(fixedContent, fixedError);
              highlightJsonErrorPosition(fixedInfo);
              throw new Error(buildJsonErrorMessage(fixedInfo, true));
            }
          }
        }
        throw new Error(buildJsonErrorMessage(errorInfo, false));
      }
    }

    function getJsonErrorInfo(content, error) {
      var index = extractJsonErrorIndex(content, error);
      var line = 0;
      var column = 0;
      if (index >= 0) {
        var lineCol = getLineColumnByIndex(content, index);
        line = lineCol.line;
        column = lineCol.column;
      }
      return {
        index: index,
        line: line,
        column: column,
        preview: buildJsonErrorPreview(content, index),
        rawMessage: error && error.message ? error.message : ""
      };
    }

    function extractJsonErrorIndex(content, error) {
      var message = error && error.message ? error.message : "";
      var posMatch = message.match(/position\s+(\d+)/i);
      if (posMatch) {
        return parseInt(posMatch[1], 10);
      }
      var lineColMatch = message.match(/line\s+(\d+)\s+column\s+(\d+)/i);
      if (lineColMatch) {
        return indexFromLineColumn(content, parseInt(lineColMatch[1], 10), parseInt(lineColMatch[2], 10));
      }
      return -1;
    }

    function getLineColumnByIndex(content, index) {
      var safeIndex = Math.max(0, Math.min(index, content.length));
      var before = content.slice(0, safeIndex).split("\n");
      return {
        line: before.length,
        column: before[before.length - 1].length + 1
      };
    }

    function indexFromLineColumn(content, line, column) {
      if (line <= 0 || column <= 0) {
        return -1;
      }
      var lines = content.split("\n");
      if (line > lines.length) {
        return -1;
      }
      var index = 0;
      for (var i = 0; i < line - 1; i++) {
        index += lines[i].length + 1;
      }
      return index + column - 1;
    }

    function buildJsonErrorPreview(content, index) {
      if (index < 0) {
        return "";
      }
      var lineCol = getLineColumnByIndex(content, index);
      var lines = content.split("\n");
      var lineText = lines[lineCol.line - 1] || "";
      var pointer = new Array(Math.max(lineCol.column, 1)).join(" ") + "^";
      return lineText + "\n" + pointer;
    }

    function buildJsonErrorMessage(errorInfo, isAutoFixedRetry) {
      var prefix = isAutoFixedRetry ? "JSON 自动修正后仍有错误" : "JSON 格式错误";
      if (errorInfo.line > 0) {
        return prefix + "，第 " + errorInfo.line + " 行第 " + errorInfo.column + " 列附近有问题。";
      }
      return prefix + "，但暂时无法定位具体行列。";
    }

    function highlightJsonErrorPosition(errorInfo) {
      if (!errorInfo) {
        return;
      }
      if (errorInfo.preview) {
        resultView.textContent = "错误定位：\n" + errorInfo.preview;
      }
      if (errorInfo.index >= 0 && typeof sourceText.setSelectionRange === "function") {
        var caretStart = Math.min(errorInfo.index, sourceText.value.length);
        var caretEnd = Math.min(caretStart + 1, sourceText.value.length);
        sourceText.focus();
        sourceText.setSelectionRange(caretStart, caretEnd);
      }
    }

    function autoFixMissingQuotedKeys(content) {
      return content.replace(/([{,]\s*)([A-Za-z_\u4e00-\u9fa5$][\w\-\u4e00-\u9fa5$]*)(\s*:)/g, '$1"$2"$3');
    }

    function formatXml(xmlString) {
      var parser = new DOMParser();
      var xmlDoc = parser.parseFromString(xmlString, "application/xml");
      if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
        throw new Error("XML 格式不合法，请检查后重试。");
      }

      var serialized = new XMLSerializer().serializeToString(xmlDoc);
      var xml = serialized.replace(/(>)(<)(\/*)/g, "$1\n$2$3");
      var lines = xml.split("\n");
      var indent = 0;
      var out = [];

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) {
          continue;
        }
        var isClosingTag = /^<\/[^>]+>$/.test(line);
        var isDeclarationOrComment = /^<\?/.test(line) || /^<!/.test(line);
        var isSelfClosingTag = /\/>$/.test(line);
        var isOpeningTag = /^<[^!?\/][^>]*>$/.test(line) && !isSelfClosingTag && !/<\/[^>]+>$/.test(line);

        if (isClosingTag) {
          indent = Math.max(indent - 1, 0);
        }
        out.push(new Array(indent + 1).join("  ") + line);
        if (isOpeningTag && !isDeclarationOrComment) {
          indent++;
        }
      }
      return out.join("\n");
    }

    function renderResult(text, keywordRaw, searchWord, resetSearchToFirst) {
      var keywords = parseKeywords(keywordRaw);
      var normalizedSearchWord = (searchWord || "").trim();
      var rendered = buildHighlightedHtml(text, keywords, normalizedSearchWord, resetSearchToFirst);

      resultView.innerHTML = rendered.html;
      searchMatches = rendered.searchMatches;
      activeSearchIndex = rendered.activeSearchIndex;
      lastSearchWord = normalizedSearchWord;
      updateSearchMeta();
      scrollToActiveMatch();
    }

    function parseKeywords(raw) {
      if (!raw) {
        return [];
      }
      var parts = raw.split(/[\s,，]+/);
      var seen = {};
      var keywords = [];
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i].trim();
        if (p && !seen[p]) {
          seen[p] = true;
          keywords.push(p);
        }
      }
      return keywords;
    }

    function buildHighlightedHtml(text, keywords, searchWord, resetSearchToFirst) {
      var len = text.length;
      if (len === 0) {
        return { html: "", searchMatches: [], activeSearchIndex: -1 };
      }

      var styleMap = new Array(len);
      for (var i = 0; i < len; i++) {
        styleMap[i] = 0;
      }

      for (var k = 0; k < keywords.length; k++) {
        applyStyle(text, keywords[k], styleMap, 1);
      }

      var ranges = collectRanges(text, searchWord);
      var nextIndex = activeSearchIndex;
      if (!searchWord || ranges.length === 0) {
        nextIndex = -1;
      } else if (resetSearchToFirst || nextIndex < 0 || nextIndex >= ranges.length) {
        nextIndex = 0;
      }

      for (var r = 0; r < ranges.length; r++) {
        var style = r === nextIndex ? 3 : 2;
        for (var p = ranges[r].start; p < ranges[r].end; p++) {
          styleMap[p] = style;
        }
      }

      var html = "";
      var start = 0;
      var current = styleMap[0];
      for (var c = 1; c <= len; c++) {
        var now = c < len ? styleMap[c] : -1;
        if (now !== current) {
          html += wrapSegment(text.slice(start, c), current);
          start = c;
          current = now;
        }
      }

      return { html: html, searchMatches: ranges, activeSearchIndex: nextIndex };
    }

    function applyStyle(text, term, styleMap, styleCode) {
      var ranges = collectRanges(text, term);
      for (var i = 0; i < ranges.length; i++) {
        for (var p = ranges[i].start; p < ranges[i].end; p++) {
          if (styleMap[p] < styleCode) {
            styleMap[p] = styleCode;
          }
        }
      }
    }

    function collectRanges(text, term) {
      if (!term) {
        return [];
      }
      var re = new RegExp(escapeRegExp(term), "gi");
      var m;
      var list = [];
      while ((m = re.exec(text)) !== null) {
        var s = m.index;
        list.push({ start: s, end: s + m[0].length });
        if (m[0].length === 0) {
          re.lastIndex++;
        }
      }
      return list;
    }

    function wrapSegment(segment, style) {
      if (!segment) {
        return "";
      }
      var escaped = escapeHtml(segment);
      if (style === 1) {
        return '<span class="keyword-highlight">' + escaped + "</span>";
      }
      if (style === 2) {
        return '<span class="search-highlight">' + escaped + "</span>";
      }
      if (style === 3) {
        return '<span class="search-highlight-active">' + escaped + "</span>";
      }
      return escaped;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeRegExp(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function locateFirst() {
      if (!lastFormattedText) {
        setStatus("请先执行格式化。", true);
        return;
      }
      var word = (searchInput.value || "").trim();
      if (!word) {
        setStatus("请输入要搜索定位的词。", true);
        return;
      }
      clearStatus();
      renderResult(lastFormattedText, keywordsInput.value, word, true);
      if (searchMatches.length === 0) {
        setStatus("未找到匹配项。", true);
      }
    }

    function locateStep(step) {
      if (!lastFormattedText) {
        setStatus("请先执行格式化。", true);
        return;
      }
      var word = (searchInput.value || "").trim();
      if (!word) {
        setStatus("请输入要搜索定位的词。", true);
        return;
      }

      if (word !== lastSearchWord) {
        renderResult(lastFormattedText, keywordsInput.value, word, true);
        if (searchMatches.length === 0) {
          setStatus("未找到匹配项。", true);
          return;
        }
        if (step < 0) {
          activeSearchIndex = searchMatches.length - 1;
          renderResult(lastFormattedText, keywordsInput.value, word, false);
        }
        clearStatus();
        return;
      }

      if (searchMatches.length === 0) {
        renderResult(lastFormattedText, keywordsInput.value, word, true);
        if (searchMatches.length === 0) {
          setStatus("未找到匹配项。", true);
          return;
        }
      }

      activeSearchIndex = (activeSearchIndex + step + searchMatches.length) % searchMatches.length;
      renderResult(lastFormattedText, keywordsInput.value, word, false);
      clearStatus();
    }

    function scrollToActiveMatch() {
      if (activeSearchIndex < 0) {
        return;
      }
      var node = resultView.querySelector(".search-highlight-active");
      if (node && typeof node.scrollIntoView === "function") {
        node.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    function setStatus(message, isError) {
      status.textContent = message;
      status.className = "meta " + (isError ? "error" : "ok");
    }

    function clearStatus() {
      status.textContent = "";
      status.className = "meta";
    }

    function updateSearchMeta() {
      var word = (searchInput.value || "").trim();
      if (!word) {
        searchMeta.textContent = "快捷键：Ctrl/Cmd + Enter 格式化，F3 下一个，Shift + F3 上一个";
        return;
      }
      if (searchMatches.length === 0) {
        searchMeta.textContent = "匹配：0";
        return;
      }
      searchMeta.textContent = "匹配：" + (activeSearchIndex + 1) + " / " + searchMatches.length;
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          setStatus("复制成功。", false);
        }).catch(function () {
          fallbackCopyText(text);
        });
        return;
      }
      fallbackCopyText(text);
    }

    function fallbackCopyText(text) {
      var input = document.createElement("textarea");
      input.value = text;
      document.body.appendChild(input);
      input.select();
      var ok = document.execCommand("copy");
      document.body.removeChild(input);
      if (ok) {
        setStatus("复制成功。", false);
      } else {
        setStatus("复制失败，请手动复制。", true);
      }
    }
  })();
</script>
</body>
</html>
